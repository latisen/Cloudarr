apiVersion: v1
kind: Namespace
metadata:
  name: media-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudarr-config
  namespace: media-system
data:
  CLOUDARR_ENV: "development"
  CLOUDARR_LOG_LEVEL: "INFO"
  CLOUDARR_PROVIDER_NAME: "realdebrid"
  CLOUDARR_REALDEBRID_API_BASE: "https://api.real-debrid.com/rest/1.0"
  CLOUDARR_WEBDAV_URL: "https://dav.real-debrid.com/"
  CLOUDARR_WEBDAV_MOUNT_PATH: "/mnt/debrid"
  CLOUDARR_WEBDAV_REMOTE_ROOT: "links"
  CLOUDARR_SYMLINK_STAGING_ROOT: "/data/downloads"
  CLOUDARR_QBIT_USERNAME: "sonarr"
  CLOUDARR_QBIT_REQUIRE_AUTH: "true"
  CLOUDARR_DEFAULT_CATEGORY: "sonarr"
  CLOUDARR_WEBDAV_REFRESH_COMMAND: "rclone rc vfs/refresh recursive=true"
  CLOUDARR_WEBDAV_REMOUNT_COMMAND: "/bin/false"
  CLOUDARR_WEBDAV_COMMAND_TIMEOUT_SECONDS: "20"
  CLOUDARR_WEBDAV_FALLBACK_SEARCH_MAX_ENTRIES: "5000"
  CLOUDARR_REFRESH_MAX_ATTEMPTS: "20"
  CLOUDARR_REFRESH_RETRY_SECONDS: "15"
  CLOUDARR_POLL_INTERVAL_SECONDS: "15"
  CLOUDARR_MAX_SUBMIT_RETRIES: "8"
  CLOUDARR_PROVIDER_WAIT_TIMEOUT_SECONDS: "7200"
  CLOUDARR_ENABLE_EMBEDDED_WORKER: "false"
  CLOUDARR_ADMIN_USER: "admin"
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudarr-secrets
  namespace: media-system
type: Opaque
stringData:
  CLOUDARR_SECRET_KEY: "change-this-random-secret-key"
  CLOUDARR_ADMIN_PASSWORD: "change-me"
  CLOUDARR_QBIT_PASSWORD: "sonarr-pass"
  CLOUDARR_REALDEBRID_API_TOKEN: ""
  CLOUDARR_WEBDAV_USERNAME: ""
  CLOUDARR_WEBDAV_PASSWORD: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudarr-api
  namespace: media-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cloudarr
      component: api
  template:
    metadata:
      labels:
        app: cloudarr
        component: api
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            [
              "sh",
              "-c",
              "mkdir -p /config /data /data/downloads /data/downloads/sonarr; touch /config/cloudarr.db || true; chown -R 1000:1000 /config /data/downloads || true; chmod 0775 /config /data/downloads /data/downloads/sonarr || true; chmod 0664 /config/cloudarr.db || true",
            ]
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media-data
              mountPath: /data
      serviceAccountName: default
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 30
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 30
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: media-role
                    operator: In
                    values:
                      - primary
            - weight: 50
              preference:
                matchExpressions:
                  - key: media-role
                    operator: In
                    values:
                      - secondary
      containers:
        - name: api
          image: cloudarr:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: web
          env:
            - name: CLOUDARR_DB_URL
              value: "sqlite:////config/cloudarr.db"
            - name: TZ
              value: "Europe/Stockholm"
          envFrom:
            - configMapRef:
                name: cloudarr-config
            - secretRef:
                name: cloudarr-secrets
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media-data
              mountPath: /data
              mountPropagation: HostToContainer
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
      volumes:
        - name: config
          hostPath:
            path: /srv/media/config/cloudarr
            type: DirectoryOrCreate
        - name: media-data
          hostPath:
            path: /srv/media/data
            type: DirectoryOrCreate
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudarr-worker
  namespace: media-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cloudarr
      component: worker
  template:
    metadata:
      labels:
        app: cloudarr
        component: worker
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            [
              "sh",
              "-c",
              "mkdir -p /config /data /data/downloads /data/downloads/sonarr; touch /config/cloudarr.db || true; chown -R 1000:1000 /config /data/downloads || true; chmod 0775 /config /data/downloads /data/downloads/sonarr || true; chmod 0664 /config/cloudarr.db || true",
            ]
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media-data
              mountPath: /data
      serviceAccountName: default
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 30
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 30
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: media-role
                    operator: In
                    values:
                      - primary
            - weight: 50
              preference:
                matchExpressions:
                  - key: media-role
                    operator: In
                    values:
                      - secondary
      containers:
        - name: worker
          image: cloudarr:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
          command:
            - "sh"
            - "-c"
            - |
              set -eu
              mkdir -p /root/.config/rclone /mnt/debrid /tmp/rclone-cache
              fusermount3 -u /mnt/debrid >/dev/null 2>&1 || true
              umount -l /mnt/debrid >/dev/null 2>&1 || true
              PASSWORD_OBSCURED="$(rclone obscure "$CLOUDARR_WEBDAV_PASSWORD")"
              cat > /root/.config/rclone/rclone.conf <<EOF
              [realdebrid]
              type = webdav
              url = ${CLOUDARR_WEBDAV_URL}
              vendor = other
              user = ${CLOUDARR_WEBDAV_USERNAME}
              pass = ${PASSWORD_OBSCURED}
              EOF
              cleanup() {
                fusermount3 -u /mnt/debrid >/dev/null 2>&1 || true
                umount -l /mnt/debrid >/dev/null 2>&1 || true
              }
              trap cleanup EXIT INT TERM
              rclone mount realdebrid: /mnt/debrid \
                --dir-cache-time 30s \
                --cache-dir /tmp/rclone-cache \
                --vfs-cache-mode writes \
                --rc \
                --rc-no-auth \
                --config /root/.config/rclone/rclone.conf \
                --allow-non-empty \
                --log-level INFO &
              RCLONE_PID=$!
              sleep 3
              if ! kill -0 "$RCLONE_PID" 2>/dev/null; then
                wait "$RCLONE_PID"
              fi
              exec python -m app.worker_main
          env:
            - name: CLOUDARR_DB_URL
              value: "sqlite:////config/cloudarr.db"
            - name: TZ
              value: "Europe/Stockholm"
          envFrom:
            - configMapRef:
                name: cloudarr-config
            - secretRef:
                name: cloudarr-secrets
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media-data
              mountPath: /data
            - name: fuse-device
              mountPath: /dev/fuse
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          hostPath:
            path: /srv/media/config/cloudarr
            type: DirectoryOrCreate
        - name: media-data
          hostPath:
            path: /srv/media/data
            type: DirectoryOrCreate
        - name: fuse-device
          hostPath:
            path: /dev/fuse
            type: CharDevice
---
apiVersion: v1
kind: Service
metadata:
  name: cloudarr
  namespace: media-system
spec:
  type: ClusterIP
  selector:
    app: cloudarr
    component: api
  ports:
    - name: web
      protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: cloudarr-expose
  namespace: media-system
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.30.59
  selector:
    app: cloudarr
    component: api
  ports:
    - name: web
      protocol: TCP
      port: 8080
      targetPort: 8080
